<style>
header,
.Header,
.site-header,
#header,
[data-header-style],
.sqs-announcement-bar-dropzone + div header,
#siteWrapper footer,
.site-footer,
#footer-sections,
.FooterBlocks,
.sqs-footer,
section[data-section-theme] footer {
  display: none !important;
}

html, body, #page, #siteWrapper, .Main, main {
  background: #F5F1EB !important;
  margin: 0 !important;
  padding: 0 !important;
  box-shadow: none !important;
}

html {
  scroll-behavior: smooth;
}

body {
  background: #F5F1EB !important;
  color: #3A2F2A;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#page {
  margin: 0 !important;
  padding: 0 !important;
}

:root {
  --bg: #F5F1EB;
  --bg-soft: #F8F4EE;
  --text: #3A2F2A;
  --muted: #6E6056;
  --soft: #8B7B70;
  --line: #E7DDD2;
  --gold: #B8955A;
  --gold-soft: #C2A46D;
  --choco: #2B221F;
  --choco-2: #3A2F2A;
  --footer: #1E1714;
  --hover: #473934;
}

/* TOP BAR */
.uc-topbar {
  width: 100%;
  height: 14px;
  background: linear-gradient(90deg, #2B221F 0%, #3A2F2A 50%, #2B221F 100%);
}

/* CONTAINER */
.uc-shell {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 40px;
}

/* BRAND */
.uc-brandbar {
  padding: 34px 0 0 0;
  text-align: center;
}

.uc-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 31px;
  line-height: 1.1;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.25px;
}

/* HERO */
.uc-hero {
  min-height: calc(100vh - 14px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 34px 0 88px 0;
  position: relative;
  overflow: hidden;
}

.uc-hero:before {
  content: "";
  position: absolute;
  width: 720px;
  height: 720px;
  border: 1px solid rgba(184,149,90,0.10);
  border-radius: 50%;
  top: -250px;
  right: -230px;
  pointer-events: none;
}

.uc-hero:after {
  content: "";
  position: absolute;
  width: 420px;
  height: 420px;
  border: 1px solid rgba(58,47,42,0.06);
  border-radius: 50%;
  bottom: -150px;
  left: -120px;
  pointer-events: none;
}

.uc-hero-inner {
  max-width: 920px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

.uc-kicker {
  font-family: 'Libre Baskerville', serif;
  font-size: 10px;
  line-height: 1.8;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #9C8F84;
  margin-bottom: 34px;
}

.uc-h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 102px;
  line-height: 0.94;
  font-weight: 500;
  color: var(--text);
  margin: 0 0 32px 0;
  letter-spacing: -1.35px;
}

.uc-sub {
  max-width: 620px;
  margin: 0 auto 22px auto;
  font-family: 'Libre Baskerville', serif;
  font-size: 20px;
  line-height: 1.9;
  color: var(--muted);
}

.uc-copy {
  max-width: 560px;
  margin: 0 auto;
  font-family: 'Libre Baskerville', serif;
  font-size: 13px;
  line-height: 2;
  color: var(--muted);
}

.uc-copy-small {
  font-family: 'Libre Baskerville', serif;
  font-size: 12px;
  line-height: 2;
  color: var(--soft);
  margin-top: 24px;
}

.uc-premium-note {
  max-width: 720px;
  margin: 28px auto 0 auto;
  text-align: center;
  font-family: 'Libre Baskerville', serif;
  font-size: 12px;
  line-height: 2;
  color: var(--soft);
}

.uc-actions {
  margin-top: 54px;
}

.uc-btn {
  display: inline-block;
  text-decoration: none;
  padding: 18px 38px;
  font-family: 'Libre Baskerville', serif;
  font-size: 12px;
  letter-spacing: 0.55px;
  transition: all 0.24s ease;
  margin: 0 8px 12px 8px;
}

.uc-btn-primary {
  background: var(--choco-2);
  color: #FFFFFF;
  border: 1px solid var(--choco-2);
}

.uc-btn-primary:hover {
  background: var(--hover);
  border-color: var(--hover);
  transform: translateY(-1px);
}

.uc-btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid #CCB8A2;
}

.uc-btn-secondary:hover {
  background: #EEE6DD;
  border-color: var(--gold);
  transform: translateY(-1px);
}
